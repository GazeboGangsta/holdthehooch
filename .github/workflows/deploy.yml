name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t holdthehooch:latest .

      - name: Save image as tarball
        run: docker save holdthehooch:latest | gzip > holdthehooch.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "holdthehooch.tar.gz"
          target: "/opt/images/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/images
            [ -f holdthehooch-current.tar.gz ] && mv holdthehooch-current.tar.gz holdthehooch-previous.tar.gz
            mv holdthehooch.tar.gz holdthehooch-current.tar.gz
            docker load < holdthehooch-current.tar.gz
            cd /opt/TNZInf
            docker compose up -d holdthehooch
